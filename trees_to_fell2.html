<!DOCTYPE HTML>
<html>

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trees to fell #2</title>
    <meta property="og:title" content="Trees to fell #2" />
    <meta property="og:description" content="Trees to fell #2 - 360-degree photo sphere" />
    <meta property="og:image" content="https://giraut.github.io/360_photography//images/thumbnails/trees_to_fell2-thumbnail.jpg" />
    <meta property="og:image:type" content="images/jpeg" />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="800" />
    <meta property="og:image:alt" content="Trees to fell #2" />
    <link rel="stylesheet" href="https://giraut.github.io/360_photography//pannellum_build/pannellum.css"/>
    <script type="text/javascript" src="https://giraut.github.io/360_photography//pannellum_build/pannellum.js"></script>
    <style>
      html {
        height: 100%;
      }
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        position: fixed;
        cursor: default;
        width: 100%;
        height: 100%;
      }
      #panorama {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="panorama"></div>
    <script>
      pannellum.viewer('panorama', {
        "title": "Trees to fell #2",
        "type": "equirectangular",
        "panorama": "https://giraut.github.io/360_photography//images/trees_to_fell2.jpg",
        "yaw": 0,
        "pitch": 53,
        "autoLoad": true,
        "hotSpots": [
          {
            "pitch": 53,
            "yaw": -5.8,
            "type": "info",
            "text": "Stuck branches"
          },
          {
            "pitch": -67.13,
            "yaw": -80.16,
            "type": "info",
            "text": "[Click for ground level view]",
            "URL": "trees_to_fell1.html"
          }
        ]
      });
    </script>
  </body>

</html>
