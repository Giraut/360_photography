<!DOCTYPE HTML>
<html>

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrise over a mystery box in the ground</title>
    <meta property="og:title" content="Sunrise over a mystery box in the ground" />

    <meta property="og:image" content="https://giraut.github.io/360_photography/images/thumbnails/mystery_box_sunrise-thumbnail.jpg" />

    <meta property="og:image:width" content="800" />

    <link rel="stylesheet" href="pannellum_build/pannellum.css"/>
    <script type="text/javascript" src="pannellum_build/pannellum.js"></script>
    <style>
      html {
        height: 100%;
      }
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        position: fixed;
        cursor: default;
        width: 100%;
        height: 100%;
      }
      #panorama {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="panorama"></div>
    <script>
      pannellum.viewer('panorama',
        {
          "hfov": 100.0,
          "autoLoad": true,
          "type": "multires",
          "multiRes": {
            "shtHash": "5M?wtTRPS4RjxaWAofofWVoJofW;ayjskCWUflaefQj[ofj]aeaeaxaxf6j[ayj]aya|fkj]ay",
            "path": "/%l/%s%y_%x",
            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 1024,
            "maxLevel": 2,
            "cubeResolution": 1744,
            "basePath": "images/multires/mystery_box_sunrise"
          },
          "title": "Sunrise over a mystery box in the ground",
          "pitch": "0",
          "hotSpotDebug": false
        }
      );
    </script>
  </body>

</html>
